name: Macro Bias Engine - Daily Ingestion

on:
  schedule:
    # Triggers daily at 22:10 UTC (Monday to Friday) representing New York Close + 10m settlement
    - cron: '10 22 * * 1-5'
  workflow_dispatch:  # Allows manual user executions directly from GitHub UI panel

jobs:
  ingest-data:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Run ingestion pipeline
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}  # Verify this is your high-privilege service_role token key
          FMP_API_KEY: ${{ secrets.FMP_API_KEY }}
        run: |
          python run_ingestion.py
