name: Macro Bias Engine - Daily Pipeline

on:
  schedule:
    # 22:10 UTC: Ingestion (NY Market Close + 10 min)
    - cron: '10 22 * * 1-5'
    # 22:20 UTC: Outcome Resolution (after ingestion completes)
    - cron: '20 22 * * 1-5'
  workflow_dispatch:
    # Manual trigger - no input needed (auto-backfill handles empty DB)

jobs:
  # ==========================================
  # JOB 1: DATA INGESTION
  # ==========================================
  ingest-data:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Run ingestion pipeline
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: |
          python run_ingestion.py

  # ==========================================
  # JOB 2: OUTCOME RESOLUTION (Walk-Forward)
  # ==========================================
  resolve-outcomes:
    runs-on: ubuntu-latest
    needs: ingest-data  # Runs AFTER ingestion completes
    
    steps:
      - name: Checkout repository code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Run outcome resolver
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: |
          python -c "from src.pipeline.outcome_resolver import run_outcome_resolution; run_outcome_resolution()"
