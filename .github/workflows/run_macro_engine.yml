name: Macro Bias Engine - Daily Ingestion

on:
  schedule:
    # Runs at 22:10 UTC, Monday to Friday (NY Market Close + 10 min buffer)
    - cron: '10 22 * * 1-5'
  workflow_dispatch:  # Allows you to manually trigger it from the GitHub Actions tab

jobs:
  ingest-data:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Run ingestion pipeline
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: |
          python run_ingestion.py
