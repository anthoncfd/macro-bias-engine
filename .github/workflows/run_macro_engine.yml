Name: Macro Bias Engine - Daily Pipeline

on:
  schedule:
    # Runs at 22:10 UTC, Monday to Friday (NY Market Close + 10 min settlement)
    - cron: '10 22 * * 1-5'
    # Outcome resolution runs after ingestion
    - cron: '20 22 * * 1-5'
  workflow_dispatch:
    # Manual trigger with optional backfill override (0 = automatic baseline checks)
    inputs:
      backfill_days:
        description: 'Number of days to backfill override (0 = automatic check)'
        required: false
        default: '0'
        type: number

jobs:
  # ==========================================
  # JOB 1: DATA INGESTION
  # ==========================================
  ingest-data:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run ingestion pipeline
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          TWELVE_DATA_API_KEY: ${{ secrets.TWELVE_DATA_API_KEY }} # Added for authenticated spot fetching
          BACKFILL_DAYS: ${{ github.event.inputs.backfill_days }}
        run: |
          python run_ingestion.py

  # ==========================================
  # JOB 2: OUTCOME RESOLUTION (Walk-Forward)
  # ==========================================
  resolve-outcomes:
    runs-on: ubuntu-latest
    needs: ingest-data  # Enforces sequential safety—runs AFTER ingestion completes
    
    steps:
      - name: Checkout repository code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run outcome resolver
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: |
          python -c "from src.pipeline.outcome_resolver import run_outcome_resolution; run_outcome_resolution()"
